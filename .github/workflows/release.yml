name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
            gh release create "$REF_NAME" --title "$REF_NAME" --notes "Release $REF_NAME"
          fi

      - name: Wait for archive and compute sha256
        id: sha
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          URL="https://github.com/$REPO/archive/refs/tags/$REF_NAME.tar.gz"
          for _ in $(seq 1 60); do
            CODE=$(curl -sIL -o /dev/null -w '%{http_code}' "$URL")
            if [ "$CODE" = "200" ]; then break; fi
            sleep 5
          done
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: thegoatsmith/homebrew-twilight
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update formula and open PR on tap
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        working-directory: tap
        run: |
          BRANCH="bump-$REF_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          sed -i -E \
            -e "s|url \"https://github.com/$REPO/archive/refs/tags/[^\"]*\"|url \"https://github.com/$REPO/archive/refs/tags/$REF_NAME.tar.gz\"|" \
            -e "s|sha256 \"[^\"]*\"|sha256 \"$SHA\"|" \
            Formula/twilight.rb
          git add Formula/twilight.rb
          git commit -m "build: bump to $REF_NAME"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "build: bump to $REF_NAME" \
            --body "Automated bump from tag push on \`$REPO\`." \
            --base main \
            --head "$BRANCH"
