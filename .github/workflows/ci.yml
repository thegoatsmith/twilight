name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Run tests
        run: |
          xcodebuild test \
            -project Twilight.xcodeproj \
            -scheme Twilight \
            -destination 'platform=macOS'
